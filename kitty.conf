# ─────────────────────────────────────────────────────────────────────────────
# FUENTE
# ─────────────────────────────────────────────────────────────────────────────
font_family      MesloLGM Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Ligaduras desactivadas a nivel de feature OpenType.
# -liga desactiva ligaduras estándar, -calt desactiva ligaduras contextuales.
disable_ligatures never
font_features     -liga -calt

# ─────────────────────────────────────────────────────────────────────────────
# CURSOR
# ─────────────────────────────────────────────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 3
cursor_blink_interval -1

# ─────────────────────────────────────────────────────────────────────────────
# SCROLLBACK
# ─────────────────────────────────────────────────────────────────────────────
scrollback_lines       10000
wheel_scroll_min_lines 1

# ─────────────────────────────────────────────────────────────────────────────
# VENTANA
# ─────────────────────────────────────────────────────────────────────────────
initial_window_width  120c
initial_window_height 35c
window_margin_width   10
window_border_width   1pt
window_padding_width  7

# No pide confirmación al cerrar la ventana principal.
confirm_os_window_close 0

# ─────────────────────────────────────────────────────────────────────────────
# LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
enabled_layouts tall

# ─────────────────────────────────────────────────────────────────────────────
# TABS
# ─────────────────────────────────────────────────────────────────────────────
tab_bar_style        powerline
tab_bar_edge         bottom
tab_bar_align        left
tab_separator        " "
tab_powerline_style  slanted
tab_activity_symbol  ●
tab_title_max_length 30
tab_title_template   "{index}: {title}"

tab_bar_margin_width  0.0
tab_bar_margin_height 0.0 0.0
tab_bar_background    none

active_tab_foreground   #ffffff
active_tab_font_style   bold-italic
inactive_tab_foreground #888888
inactive_tab_font_style normal

# ─────────────────────────────────────────────────────────────────────────────
# MISCELÁNEA
# ─────────────────────────────────────────────────────────────────────────────
background_opacity 1
allow_hyperlinks   yes
editor             nvim

# Shell integration: kitty entiende la estructura de la sesión de zsh.
# Habilita navegación entre prompts (kitty_mod+z/x), tab_activity_symbol,
# new_tab_here con cwd correcto, y marcado visual de comandos fallidos.
shell_integration enabled

# URLs detectadas automáticamente quedan subrayadas y se abren con ctrl+click.
detect_urls      yes
url_style        curly
open_url_with    default

# ─────────────────────────────────────────────────────────────────────────────
# KEYBINDS
# ─────────────────────────────────────────────────────────────────────────────
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection

# Scrollback
map kitty_mod+home scroll_home
map kitty_mod+end  scroll_end
map kitty_mod+h    show_scrollback

# Navega entre prompts anteriores y siguientes (requiere shell integration).
map kitty_mod+z scroll_to_prompt -1
map kitty_mod+x scroll_to_prompt 1

# Ventanas — ctrl+enter abre una nueva ventana en el cwd actual.
map ctrl+enter new_window
map ctrl+]     next_window
map ctrl+[     previous_window

# Tabs — new_tab_here abre la tab en el cwd actual.
action_alias new_tab_here launch --type=tab --cwd=current
map kitty_mod+t new_tab_here
map ctrl+tab        next_tab
map kitty_mod+tab   previous_tab
map ctrl+q          close_tab

# ─────────────────────────────────────────────────────────────────────────────
# TEMA
# El tema activo se gestiona con `kitten themes`. No editar manualmente.
# ─────────────────────────────────────────────────────────────────────────────
# BEGIN_KITTY_THEME
# Eldritch
include current-theme.conf
# END_KITTY_THEME
